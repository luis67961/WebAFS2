<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <link rel="stylesheet" th:href="@{/estilos/navbarTienda.css}">
  <link rel="stylesheet" th:href="@{/estilos/tienda.css}">
  <link rel="stylesheet" th:href="@{/estilos/login.css}">


  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>




  <!-- Navbar -->
  <div th:replace="~{fragmentos/navTienda :: navbarT}"></div>

  <div th:replace="~{fragmentos/carrito :: cartOffcanvas}"></div>

  <div class="d">
    <div id="errorBox" th:if="${error}">
      <p th:text="${error}" style="color:rgb(255, 255, 255);"></p>
    </div>




  </div>


  <section class="auth-section">

    <!-- NO LOGUEADO -->
    <div class="auth-container" th:if="${usuario == null}">

      <div class="auth-left">
        <h1>Bienvenido a la Tienda</h1>
        <p>Inicia sesión o crea tu cuenta para continuar</p>

        <button type="button" class="google-btn" data-bs-toggle="modal" data-bs-target="#loginModal">
          <i class="bi bi-box-arrow-in-right"></i>
          Iniciar sesión
        </button>
      </div>

      <div class="auth-right">

        <h2>Crear cuenta</h2>

        <form action="/registro" method="post">
          <input type="text" name="nombres" placeholder="Nombres" required>

          <input type="text" name="apellidos" placeholder="Apellidos" required>
          <input type="email" name="email" placeholder="Correo electrónico" required>

          <input type="password" name="password" placeholder="Contraseña" required>

          <input type="text" name="dni" placeholder="DNI" required>

          <input type="tel" name="whatsapp" placeholder="WhatsApp" required>

          <input type="date" name="fechaNacimiento" required>

          <button type="submit">Crear cuenta</button>

        </form>

      </div>

    </div>

    <!-- LOGUEADO -->
    <section class="perfil-section" th:if="${usuario != null}">

      <div class="perfil-container">

        <div class="perfil-card">

          <div class="perfil-header">
            <i class="bi bi-person-circle perfil-avatar"></i>
            <h2>Mi Perfil</h2>
            <p>Información de tu cuenta</p>
          </div>

          <div class="perfil-body">

            <div class="perfil-item">
              <i class="bi bi-envelope-fill icon"></i>
              <span>Email</span>
              <strong th:text="${usuario.email}"></strong>
            </div>

            <div class="perfil-item">
              <i class="bi bi-person-fill icon"></i>
              <span>Nombres</span>
              <strong th:text="${usuario.nombres}"></strong>
            </div>

            <div class="perfil-item">
              <i class="bi bi-person-badge-fill icon"></i>
              <span>Apellidos</span>
              <strong th:text="${usuario.apellidos}"></strong>
            </div>

            <div class="perfil-item">
              <i class="bi bi-credit-card-2-front-fill icon"></i>
              <span>DNI</span>
              <strong th:text="${usuario.dni}"></strong>
            </div>

            <div class="perfil-item">
              <i class="bi bi-whatsapp icon"></i>
              <span>WhatsApp</span>
              <strong th:text="${usuario.whatsapp}"></strong>
            </div>

            <div class="perfil-item">
              <i class="bi bi-calendar-event-fill icon"></i>
              <span>Fecha nacimiento</span>
              <strong th:text="${usuario.fechaNacimiento}"></strong>
            </div>

          </div>

          <div class="perfil-footer">

            <form action="/logout" method="post"> <button type="submit" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i> Cerrar sesión
              </button>
            </form>






            <form id="deleteForm">
              <button type="button" class="btn-delete">
                <i class="bi bi-trash-fill"></i> Eliminar cuenta
              </button>
            </form>
            </form>

          </div>

        </div>

      </div>

    </section>


  </section>











  <!-- MODAL INICAR SESIONM
     
    
    
    
  
    -->
  <div id="toast" class="toast-box"></div>

  <div class="modal fade" id="loginModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">
            <i class="bi bi-person-lock"></i> Iniciar sesión
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <form action="/iniciar-sesion" method="post">
            <div class="mb-3">
              <label class="form-label">Correo electrónico</label>
              <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Iniciar sesión
            </button>

          </form>

        </div>

      </div>

    </div>

  </div>


























  



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script th:src="@{/script/registroUsuario.js}"></script>
    <script th:src="@{/script/tienda.js}"></script>
  <script th:src="@{/script/misPedidos.js}"></script>
  <script th:src="@{/script/SolicitarVisita.js}"></script>





</body>

</html>
